<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Threat Protection System</title>
    <style>
        :root {
            --primary-neon: #00d4ff;
            --secondary-neon: #0051ff;
            --bg-deep: #020617;
            --card-bg: rgba(10, 18, 35, 0.9);
            --border-color: rgba(0, 212, 255, 0.3);
            --text-main: #e2e8f0;
            --text-dim: #94a3b8;
            --font-main: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            --error-red: #ff4d4d;
            --success-green: #00ffaa;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes borderFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes bgMove {
            0% { background-position: 0 0; }
            100% { background-position: 100px 100px; }
        }

        @keyframes scan {
            0% { top: -100%; }
            100% { top: 100%; }
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-deep);
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(0, 81, 255, 0.1) 0%, transparent 80%),
                url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 0l25.98 15v30L30 60 4.02 45V15z' fill-opacity='0.03' fill='%2300d4ff' fill-rule='evenodd'/%3E%3C/svg%3E");
            animation: bgMove 20s linear infinite;
            color: var(--text-main);
            font-family: var(--font-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
            position: relative;
        }

        /* Scanline effect */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--primary-neon), transparent);
            opacity: 0.1;
            z-index: 10;
            animation: scan 8s linear infinite;
            pointer-events: none;
        }

        .container { 
            width: 100%; 
            max-width: 450px; 
            animation: fadeInUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        .header { 
            text-align: center; 
            margin-bottom: 30px; 
        }

        .header h1 {
            font-size: 2.2rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -1px;
            background: linear-gradient(to right, #fff, var(--primary-neon));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }

        .header p {
            color: var(--primary-neon);
            font-size: 0.75rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.8;
            font-weight: 600;
        }

        .card-wrapper {
            position: relative;
            padding: 2px;
            border-radius: 18px;
            background: linear-gradient(90deg, var(--border-color), var(--primary-neon), var(--border-color));
            background-size: 200% 200%;
            animation: borderFlow 4s linear infinite;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            position: relative;
            overflow: hidden;
        }

        /* HUD Corners */
        .card::before, .card::after {
            content: "";
            position: absolute;
            width: 15px;
            height: 15px;
            border: 2px solid var(--primary-neon);
            opacity: 0.5;
        }
        .card::before { top: 15px; left: 15px; border-right: 0; border-bottom: 0; }
        .card::after { bottom: 15px; right: 15px; border-left: 0; border-top: 0; }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.8rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 8px;
            color: #fff;
            font-size: 1rem;
            transition: all 0.3s ease;
            outline: none;
            font-family: var(--font-main);
        }

        input:focus {
            border-color: var(--primary-neon);
            background: rgba(0, 212, 255, 0.08);
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.15);
        }

        .alert {
            padding: 12px 15px;
            border-radius: 6px;
            font-size: 0.85rem;
            margin-bottom: 20px;
            display: none;
            font-weight: 500;
            text-align: center;
        }

        .alert-success {
            background: rgba(0, 255, 170, 0.1);
            border: 1px solid var(--success-green);
            color: var(--success-green);
        }

        .alert-error {
            background: rgba(255, 77, 77, 0.1);
            border: 1px solid var(--error-red);
            color: var(--error-red);
        }

        .btn-login {
            width: 100%;
            padding: 16px;
            margin-top: 10px;
            background: var(--primary-neon);
            color: var(--bg-deep);
            border: none;
            border-radius: 8px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.3);
        }

        .btn-login:hover {
            background: #fff;
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 12px 25px rgba(0, 212, 255, 0.5);
        }

        .btn-login:disabled {
            background: #444;
            color: #888;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .footer-links {
            text-align: center;
            margin-top: 30px;
            font-size: 0.85rem;
            color: var(--text-dim);
            line-height: 1.6;
        }

        .footer-links a {
            color: var(--primary-neon);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s;
        }

        .footer-links a:hover {
            color: #fff;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Login</h1>
            <p>// SECURE_ACCESS_TERMINAL //</p>
        </div>

        <div class="card-wrapper">
            <div class="card">
                <form id="loginForm">
                    <div class="form-group">
                        <label for="email">User Identifier</label>
                        <input type="email" id="email" name="email" required placeholder="identity@domain.com">
                    </div>

                    <div class="form-group">
                        <label for="password">Encryption Key</label>
                        <input type="password" id="password" name="password" required placeholder="••••••••">
                    </div>

                    <div id="alert" class="alert"></div>

                    <button type="submit" class="btn-login" id="loginBtn">Initialize Auth</button>
                </form>

                <div class="footer-links">
                    Don't have an account? <a href="/register">Create Access</a><br>
                    <a href="/">← Return to System Terminal</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const alertBox = document.getElementById('alert');
            const btn = document.getElementById('loginBtn');
            
            btn.textContent = 'PROVISIONING...';
            btn.disabled = true;
            
            try {
                // Logic preserved exactly as requested
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                
                if (data.access_granted) {
                    alertBox.textContent = '✓ Authentication successful. Redirecting...';
                    alertBox.className = 'alert alert-success';
                    alertBox.style.display = 'block';
                    
                    localStorage.setItem('currentUser', JSON.stringify(data.user));
                    
                    setTimeout(() => {
                        window.location.href = '/dashboard';
                    }, 1500);
                } else {
                    alertBox.textContent = '✕ ' + data.message;
                    alertBox.className = 'alert alert-error';
                    alertBox.style.display = 'block';
                    btn.textContent = 'Initialize Auth';
                    btn.disabled = false;
                }
            } catch (error) {
                alertBox.textContent = '✕ Connection refused. Terminal offline.';
                alertBox.className = 'alert alert-error';
                alertBox.style.display = 'block';
                btn.textContent = 'Initialize Auth';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
